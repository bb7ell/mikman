<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="لوحة تحكم MikroTik — سجّل دخولك للاتصال براوترك" />
  <title>MikroTik Dashboard — تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">

  <!-- Animated background particles -->
  <div class="bg-particles" aria-hidden="true">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- Network grid overlay -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <main class="login-container">

    <!-- Logo & Branding -->
    <div class="login-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" stroke="url(#g1)" stroke-width="2"/>
          <path d="M15 30 Q22 18 30 30 Q38 42 45 30" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="15" cy="30" r="3.5" fill="#00d4ff"/>
          <circle cx="30" cy="30" r="3.5" fill="#7c3aed"/>
          <circle cx="45" cy="30" r="3.5" fill="#00d4ff"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-title">MikroTik Dashboard</h1>
      <p class="brand-sub">لوحة إدارة الشبكة الاحترافية</p>
    </div>

    <!-- Login Card -->
    <div class="login-card glass-card">
      <div class="card-header">
        <h2>الاتصال بالراوتر</h2>
        <p>أدخل بيانات الراوتر للمتابعة</p>
      </div>

      <!-- Saved Routers Quick Access -->
      <div id="savedRoutersGrid" class="routers-grid" style="display: none;">
        <!-- Router Cards will be injected here -->
      </div>
      
      <button type="button" id="showManualFormBtn" class="btn-outline" style="display: none; width: 100%; margin-bottom: 20px;" onclick="toggleManualForm()">
        + إضافة راوتر جديد
      </button>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-header-toggle" id="manualFormHeader" style="display: none;">
          <h3>إضافة راوتر جديد</h3>
          <hr style="border-color: rgba(255,255,255,0.1); margin-bottom: 15px;">
        </div>

        <!-- Router Name (Optional, for saving) -->
        <div class="form-group">
          <label for="routerName">اسم الراوتر (اختياري - لحفظه للاستخدام السريع)</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </span>
            <input type="text" id="routerName" name="routerName" placeholder="مثال: شبكة الفرع الرئيسي" autocomplete="off" />
          </div>
        </div>

        <!-- Router IP -->
        <div class="form-group">
          <label for="host">عنوان IP للراوتر</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="3"/><path d="M8 12h8M12 8v8"/>
              </svg>
            </span>
            <input type="text" id="host" name="host" placeholder="192.168.1.1"
              autocomplete="off" spellcheck="false" required />
          </div>
        </div>

        <!-- Port -->
        <div class="form-group">
          <label for="port">منفذ API</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </span>
            <input type="number" id="port" name="port" value="8728"
              min="1" max="65535" required />
          </div>
          <div class="port-hints">
            <button type="button" class="port-chip" data-port="8728">API (8728)</button>
            <button type="button" class="port-chip" data-port="8729">API-SSL (8729)</button>
            <button type="button" class="port-chip" data-port="80">WWW (80)</button>
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
            <input type="text" id="username" name="username" placeholder="admin"
              autocomplete="username" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••"
              autocomplete="current-password" />
            <button type="button" id="togglePassword" class="input-eye" aria-label="إظهار كلمة المرور">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg" role="alert" aria-live="polite" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText"></span>
        </div>

        <!-- Submit Button -->
        <button type="button" id="loginBtn" class="btn-primary" onclick="handleLoginRequest()">
          <span class="btn-text">اتصال بالراوتر</span>
          <span class="btn-spinner" hidden>
            <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="32" stroke-dashoffset="8"/></svg>
            جارٍ الاتصال...
          </span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

      </form>
    </div>

    <!-- Version badge -->
    <p class="version-tag">RouterOS 6.x Compatible</p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
